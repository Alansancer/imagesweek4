<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="styles/styles.css" rel="stylesheet">
    <title>Contactign my home (links and images)</title>
</head>
<body>
    <header>
        <h1>More about Mexico</h1>
    </header>
    <nav>
        <!--nav section is organized in a list to easy access-->
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
            <!--external pages need the full address... use "_blank" to open in a new tab-->
            <li><a href="https://www.youtube.com/watch?v=ZZ5LpwO-An4&list=PLV2ewAgCPCq0DVamOw2sQSAVdFVjA6x78"
                 target="_blank">Secrets</a></li>
        </ul>
    <main>
        <!--HTML forms lets user enter information into your site-->
        <!--form require two attributes to tell them how to submit: action tells the form where to go (what page)
        method tells the form how to send the information-->
        <!--there are to forms of methods, the POST method, makes the form encrypted and secure to send, while the 
        GET method sends the information as it is-->
        <form action="contact.html" method="get">
            <!--section will help us divide and organize our stuff on the website-->
            <section>
            <!--form botton will submitt everything that will be written inside of it, for different stuff have different from-->
            <!--something to have in mind is that the input has to have a label, to help the usser knwo what it is-->
            <!--to link the lable with the inpt, us 'for' on the label matching the 'id' on the input-->
            <label for="name">Name:</label>
            <input id="name" type="text" name="name" placeholder="Full Name" reuired>
            <!--REMEMEBR THAT LABEL IS HOW THE BOX IS CALLED, FOR IS USED TO REFERENCE THE ID TO HELP LINK AND MAKE OVERALL
            NAVIGATION EASIER-->
            <!--with input, you can specify different types-->
            <label for="email">Email:</label>
            <input id="email" type="email" name="email" placeholder="@example.com" required>
            </section>
                <!--the creation of a different section suggest the website to put all the block of information onto the next field-->
                <section>
                <label for="pass">Password:</label>
                <input type="password" id="pass" name="pass" placeholder="****" required>

                <label for="when">When?</label>
                <input id="when" type="date" name="when">
                    <!--there is a control of how much the user can use, for the number label you can add a max and a min-->
                <label for="how">How many?</label>
                <input type="number" id="how" min="0" max="100" name="how">
                <!--always remember to check for the type within the input since that helps modify the nature of the botton or
                in this case the box-->
                </section>
                <section>
                    <!--for a drop down menu use the select tag-->
                    <label for="cities">Your Town</label>
                    <select id="cities" name="cities">
                        <option value="oaxaca">Oaxaca</option>
                        <option value="cdmx" selected>CDMX</option>
                        <option value="chihuahua">Chihuahua</option>
                    
                    </select>
                </section>

                <!--radio buttons operate as a set - check one, and the others uncheck... In other words one a button is selected
                the rest unselect-->
                    <label for="one">1</label>
                    <input type="radio" name="howmany" id="one" value="1">
                     <label for="two">2</label>
                    <input type="radio" name="howmany" id="one" value="2"> 
                    <label for="three">3</label>
                    <input type="radio" name="howmany" id="one" value="3">
                </selection>
                <section>
                    <!--to submit a botton there has to be a botton that can help you submit such a thing-->
                    <!--the botton also has to be within the form you are trying the user to submit, if its not inside the form,then 
                    it will submit where the botton is located-->
                    <input type="submit" value="Submit the Form" name="submit">
                </section>
        </form>
    </main>
</body>
</html>
